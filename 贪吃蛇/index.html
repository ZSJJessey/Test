<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-wrap">
      <h1>贪吃蛇</h1>
      <div class="panel">
        <div class="panel-left">
          <p>分数：<span id="score">0</span></p>
          <p class="high-line">最高分：<span id="highScore">0</span></p>
        </div>
        <button id="restartBtn" type="button">重新开始</button>
      </div>
      <label class="wrap-label">
        <input type="checkbox" id="wrapWall" />
        穿墙模式
      </label>
      <div class="canvas-shell">
        <canvas id="game" width="400" height="400" aria-label="贪吃蛇游戏画布"></canvas>
        <div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
          <div class="overlay-card">
            <h2 id="overlayTitle">贪吃蛇</h2>
            <p id="overlayMessage" class="overlay-msg"></p>
            <button type="button" id="overlayBtn" class="overlay-btn">开始游戏</button>
          </div>
        </div>
      </div>
      <p class="tips">方向键 / WASD 移动，空格暂停；手机在画布上滑动转向</p>
<p id="status" class="status"></p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
